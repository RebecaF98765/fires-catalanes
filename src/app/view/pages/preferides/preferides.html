<section class="preferides-page">
  <h2>Fires preferides</h2>

  @if(favoriteFairs.length > 0) {
    @for(fair of favoriteFairs; track fair.activityId) {
      <article class="favorite-card">
        <h3>{{ fair.activityName }}</h3>
        <p><strong>Poble:</strong> {{ fair.municipalityName }}</p>

        <button (click)="onRemoveFavorite(fair)">Desmarcar</button>
        <button (click)="onShowDetails(fair)">Veure detalls</button>
      </article>
    }
  } @else {
    <p>No tens cap fira preferida.</p>
  }
</section>
